<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
            <div>
              <h2 class="h4 mb-1">📦 Lista de Pedidos</h2>
              <p class="text-muted mb-0">Administra tus pedidos y crea nuevos pedidos de forma rápida.</p>
            </div>
            <span class="badge bg-primary fs-6 mt-3 mt-md-0">{{ pedidos?.length ?? 0 }} pedidos</span>
          </div>

          <div *ngIf="!pedidos || pedidos.length === 0" class="alert alert-info">
            No hay pedidos registrados
          </div>

          <div *ngIf="pedidos && pedidos.length > 0" class="table-responsive mb-4">
            <table class="table table-striped align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Nombre</th>
                  <th class="text-end">Total</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let p of pedidos">
                  <td>{{ p.name }}</td>
                  <td class="text-end">${{ p.total }}</td>
                  <td class="text-center">
                    <button
                      type="button"
                      class="btn btn-sm btn-outline-primary me-2"
                      (click)="editarPedido(p, p.id)"
                      title="Editar pedido">
                      ✏️
                    </button>
                    <button
                      type="button"
                      class="btn btn-sm btn-outline-danger"
                      (click)="eliminarPedido(p.id)"
                      title="Eliminar pedido">
                      🗑️
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <hr />

          <div>
            <h3 class="h5 mb-3">{{ editando ? '✏️ Editar Pedido' : '➕ Crear Pedido' }}</h3>

            <form (ngSubmit)="crearPedido()" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre:</label>
                <input
                  type="text"
                  class="form-control"
                  [(ngModel)]="nuevo.name"
                  name="name"
                  required
                />
              </div>

              <div class="col-md-4">
                <label class="form-label">Total:</label>
                <input
                  type="number"
                  class="form-control"
                  [(ngModel)]="nuevo.total"
                  name="total"
                  min="0"
                  required
                />
              </div>

              <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">
                  {{ editando ? 'Actualizar' : 'Crear' }}
                </button>
              </div>

              <div *ngIf="editando" class="col-12">
                <button type="button" class="btn btn-secondary" (click)="cancelarEdicion()">
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
